                <!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>psí věštírna</title>
  <style>
    :root {
      --bg: #120a2b;
      --card: #221742;
      --text: #f7e8ff;
      --accent: #c28bff;
      --accent-2: #77d4ff;
      --shadow: rgba(16, 10, 48, 0.36);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top left, #392271 0%, #120a2b 45%, #09030e 100%),
        radial-gradient(circle, rgba(255,255,255,0.18) 1px, transparent 1px);
      background-size: 100% 100%, 18px 18px;
      color: var(--text);
      padding: 1.5rem;
    }

    .fortune-app {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid rgba(159, 132, 202, 0.18);
      border-radius: 24px;
      box-shadow: 0 24px 70px var(--shadow);
      overflow: hidden;
    }

    .hero {
      position: relative;
      padding: 2rem;
      text-align: center;
      background: linear-gradient(135deg, rgba(137, 68, 205, 0.28), rgba(54, 13, 78, 0.72));
      border-bottom: 1px solid rgba(180, 154, 222, 0.22);
      overflow: hidden;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(30px);
      opacity: 0.55;
    }

    .hero::before {
      width: 180px;
      height: 180px;
      top: -50px;
      right: -40px;
      background: rgba(255, 255, 255, 0.18);
    }

    .hero::after {
      width: 240px;
      height: 240px;
      bottom: -90px;
      left: -70px;
      background: rgba(120, 88, 235, 0.24);
    }

    .hero h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 0.6rem;
      letter-spacing: 0.02em;
    }

    .hero .dog-icon {
      width: 280px;
      height: 260px;
      margin: 0 auto 1.5rem;
      display: block;
      position: relative;
      z-index: 1;
    }

    .hero svg {
      width: 100%;
      height: 100%;
    }

    .hero p {
      color: rgba(247, 232, 255, 0.92);
      font-size: 1rem;
      line-height: 1.6;
      max-width: 38rem;
      margin: 0 auto;
    }

    .content {
      padding: 2rem;
    }

    .output {
      min-height: 140px;
      padding: 1.6rem;
      margin-bottom: 1.8rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      display: grid;
      place-items: center;
      text-align: center;
      line-height: 1.7;
      font-size: 1.1rem;
      transition: transform 0.25s ease;
    }

    .output.shine {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(40, 111, 255, 0.16);
    }

    .button-row {
      display: flex;
      justify-content: center;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 0.95rem 1.8rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 16px 30px rgba(159, 91, 233, 0.22);
      color: #1f1341;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    button:hover,
    button:focus-visible {
      transform: translateY(-2px);
      filter: brightness(1.05);
      outline: none;
    }

    button:active {
      transform: translateY(0);
    }

    .footer {
      margin-top: 1.5rem;
      text-align: center;
      color: #98a3c0;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main class="fortune-app">
    <section class="hero">
      <div class="dog-icon">
        <svg viewBox="0 0 320 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Roztomilý pes">
          <defs>
            <linearGradient id="furGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#f7d6c7" />
              <stop offset="100%" stop-color="#d49c78" />
            </linearGradient>
            <linearGradient id="earGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#a66b4b" />
              <stop offset="100%" stop-color="#593720" />
            </linearGradient>
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.22" />
            </filter>
          </defs>

          <g filter="url(#shadow)">
            <ellipse cx="165" cy="244" rx="105" ry="32" fill="rgba(255,255,255,0.08)" />
            <path d="M65 180 C40 130, 48 90, 105 84 C135 78, 166 82, 190 105 C215 90, 250 92, 255 142 C280 160, 280 190, 240 198 C225 220, 204 228, 170 228 C140 235, 110 226, 85 205 C60 190, 60 190, 65 180 Z" fill="url(#furGradient)" />
            <path d="M62 170 C44 155, 32 132, 40 110 C48 90, 70 78, 96 84 C88 115, 90 150, 62 170 Z" fill="url(#earGradient)" />
            <path d="M255 142 C270 118, 290 113, 292 135 C295 160, 278 180, 255 170 C255 170, 255 170, 255 142 Z" fill="url(#earGradient)" />
            <path d="M84 154 C90 128, 116 98, 155 96 C194 94, 220 122, 226 150 C224 172, 205 182, 185 186 C170 188, 155 190, 140 186 C120 180, 104 172, 84 154 Z" fill="#fff2e4" />
            <path d="M98 148 C108 142, 126 130, 155 130 C186 130, 204 144, 214 152 C216 132, 214 118, 195 106 C168 88, 126 92, 102 118 C96 128, 96 140, 98 148 Z" fill="#f1c9ac" />
            <circle cx="123" cy="160" r="12" fill="#2b1618" />
            <circle cx="196" cy="160" r="12" fill="#2b1618" />
            <circle cx="121" cy="158" r="6" fill="#fff" opacity="0.75" />
            <circle cx="194" cy="158" r="6" fill="#fff" opacity="0.75" />
            <path d="M120 193 C135 202, 178 202, 190 192" stroke="#593720" stroke-width="8" fill="none" stroke-linecap="round" />
            <path d="M135 216 C145 226, 175 226, 185 216" stroke="#8b5b42" stroke-width="10" fill="none" stroke-linecap="round" />
            <path d="M112 181 C108 196, 110 212, 122 222 C130 230, 142 232, 154 228" stroke="#8b5b42" stroke-width="10" fill="none" stroke-linecap="round" />
            <path d="M188 182 C192 198, 190 214, 178 224 C170 230, 158 232, 146 228" stroke="#8b5b42" stroke-width="10" fill="none" stroke-linecap="round" />
            <path d="M130 84 C126 54, 152 38, 184 42 C218 46, 246 70, 250 102 C254 134, 226 160, 192 162 C170 163, 150 156, 128 138" fill="#f7d6c7" />
            <path d="M126 86 C120 60, 142 44, 170 46 C198 48, 234 76, 238 102 C242 129, 212 156, 190 156 C166 156, 150 148, 128 132" fill="rgba(203, 148, 107, 0.18)" />
            <path d="M158 148 C156 138, 152 128, 146 120 C132 104, 108 98, 95 110" stroke="#5a3621" stroke-width="6" fill="none" stroke-linecap="round" />
            <path d="M190 146 C192 136, 196 126, 202 118 C216 102, 240 96, 253 108" stroke="#5a3621" stroke-width="6" fill="none" stroke-linecap="round" />
          </g>
        </svg>
      </div>
      <h1>psí věštírna</h1>
      <p>Stiskni tlačítko a nech pejska, ať ti řekne věštbu. Je to hravé, přátelské a plné psích rad.</p>
    </section>

    <section class="content">
      <div id="fortuneOutput" class="output">Zmáčkni tlačítko a pejsek ti práskne svou věštbu.</div>
      <div class="button-row">
        <button id="fortuneButton" type="button">Získej psí věštbu</button>
      </div>
      <div class="footer">Psí věštírna pro dobrý den a úsměv. Všechno bez pamlsků, jen zábava.</div>
    </section>
  </main>

  <script>
    const fortunes = [
      "Všechno běží hladce, ale je čas udělat zálohu. Nikdy nevíš, kdy se mrtvý server probudí.",
      "Automatická věštba: Udrž si duši v klidu a logy připravené. Debug už jde po tobě.",
      "Ať už je to pět minut nebo pět hodin, nový deploy je téměř hotový. Ať se server nezadusí.",
      "Tvoje konfigurace se rozmnoží v ideálním stavu — jen nezapomeň na .env soubor.",
      "Čeká tě noc plná commitů. Nech si energii a nepřepínej build v poslední minutě.",
      "Síť ti naservíruje odpověď, když budeš trpělivý. Mezitím vyčisti cache a kafe dopij do dna.",
      "Tvoje přání jsou v pelíšku a čekají na správný okamžik. Dneska mír, zítra dobrou procházku.",
      "V budoucnu ti udělá radost nový pamlsek. Teď se drž a naslouchej štěkotu klidu.",
      "Pravděpodobnost radosti roste s dobrou náladou. Jeden pohled, jeden drb, jeden krok vpřed.",
      "Největší věštba: spokojený den s ocasem ve vzduchu. Ale možná tě dneska čeká i drobný psí dobrodružství."
    ];

    const outputEl = document.getElementById("fortuneOutput");
    const buttonEl = document.getElementById("fortuneButton");

    function getFortune() {
      const index = Math.floor(Math.random() * fortunes.length);
      return fortunes[index];
    }

    buttonEl.addEventListener("click", () => {
      outputEl.textContent = getFortune();
      outputEl.classList.add("shine");
      setTimeout(() => outputEl.classList.remove("shine"), 400);
    });
  </script>
</body>
</html>
